[bell]
duration = 10

# Colors (Tokyo Night) — inlined; `import` was silently failing on 0.13.2
[colors.primary]
background = '#1a1b26'
foreground = '#a9b1d6'

[colors.normal]
black = '#32344a'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#ad8ee6'
cyan = '#449dab'
white = '#787c99'

[colors.bright]
black = '#444b6a'
red = '#ff7a93'
green = '#b9f27c'
yellow = '#ff9e64'
blue = '#7da6ff'
magenta = '#bb9af7'
cyan = '#0db9d7'
white = '#acb0d0'

[font]
size = 19.0

[font.normal]
family = "NotoMono Nerd Font"
style = "Regular"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[window]
decorations = "full"
option_as_alt = "Both"
startup_mode = "Maximized"

[[keyboard.bindings]]
key = "Enter"
mods = "Shift"
chars = "\u001b\r"
