# Starship prompt вҖ” Tokyo Night palette, agnoster-inspired Powerline style
# Requires a Nerd Font (Alacritty is configured for "NotoMono Nerd Font").
# Powerline separator: U+E0B0 (оӮ°)

add_newline = false
command_timeout = 500

format = """\
$os\
$directory\
$git_branch\
$git_status\
$nodejs$python$golang$rust$java\
$cmd_duration\
$line_break\
$character"""

# в”Җв”Җв”Җ OS icon (leftmost segment) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
format = "[ $symbol ](bg:#9ece6a fg:#1a1b26)"

[os.symbols]
Macos  = "пҢӮ"
Linux  = "п…ј"
Ubuntu = "пҢӣ"

# в”Җв”Җв”Җ Current directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
format = "[оӮ°](fg:#9ece6a bg:#7aa2f7)[ $path ](bg:#7aa2f7 fg:#1a1b26)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only = " пҖЈ "

# в”Җв”Җв”Җ Git branch (only rendered inside a repo) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "оӮ "
format = "[оӮ°](fg:#7aa2f7 bg:#e0af68)[ $symbol $branch ](bg:#e0af68 fg:#1a1b26)"

# в”Җв”Җв”Җ Git status (continues yellow segment, closes arrow into void) в”Җв”Җв”Җв”Җв”Җ
[git_status]
format = "[$all_status$ahead_behind](bg:#e0af68 fg:#1a1b26)[оӮ°](fg:#e0af68)"
modified   = "${count}в—Ҹ "
staged     = "${count}+ "
untracked  = "${count}? "
ahead      = "вҮЎ${count} "
behind     = "вҮЈ${count} "
diverged   = "вҮ•${count} "
conflicted = "!${count} "
deleted    = "${count}вң– "
renamed    = "${count}В» "
stashed    = "${count}* "

# в”Җв”Җв”Җ Runtime versions (only when project files present) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
format = "[  $symbol $version ](fg:#9ece6a)"
symbol = "оңҳ"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
format = "[  $symbol $version ](fg:#e0af68)"
symbol = "оҲө"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile"]

[golang]
format = "[  $symbol $version ](fg:#7aa2f7)"
symbol = "оҳҰ"
detect_files = ["go.mod", "go.sum"]

[rust]
format = "[  $symbol $version ](fg:#f7768e)"
symbol = "оһЁ"
detect_files = ["Cargo.toml"]

[java]
format = "[  $symbol $version ](fg:#bb9af7)"
symbol = "оңё"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "deps.edn"]

# в”Җв”Җв”Җ Command duration (only for slow commands) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
format = "[ took $duration ](fg:#ff9e64)"
min_time = 2000

# в”Җв”Җв”Җ Prompt character (vi-mode aware) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold #9ece6a)"
error_symbol   = "[вқҜ](bold #f7768e)"
vimcmd_symbol  = "[вқ®](bold #7aa2f7)"
