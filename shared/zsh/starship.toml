# Starship prompt вҖ” Tokyo Night palette, agnoster-inspired Powerline style
# Requires a Nerd Font (Alacritty is configured for "NotoMono Nerd Font").
# Color values live in the [palettes.tokyonight] block below; format strings
# reference them by name. Regenerate that block with theme/regenerate.sh.

add_newline = false
command_timeout = 500
palette = "tokyonight"

format = """\
${custom.os_ok}${custom.os_err}\
$directory\
${custom.dir_close}\
$git_branch\
$git_status\
$nodejs$python$golang$rust$java\
$cmd_duration\
$character"""

# >>> palette (generated from theme/palette.sh вҖ” do not edit) >>>
[palettes.tokyonight]
bg = "#1a1b26"
bg_dark = "#16161e"
bg_highlight = "#292e42"
fg = "#c0caf5"
fg_dark = "#a9b1d6"
comment = "#565f89"
red = "#f7768e"
orange = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
teal = "#1abc9c"
cyan = "#7dcfff"
blue = "#7aa2f7"
blue0 = "#3d59a1"
magenta = "#bb9af7"
purple = "#9d7cd8"
# <<< palette <<<

# в”Җв”Җв”Җ OS icon (leftmost segment) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[custom.os_ok]
when = '[ "${STARSHIP_CMD_STATUS:-0}" = "0" ]'
shell = ["sh"]
command = '''
case "$(uname -s)" in
  Darwin) ICON=$(printf "\357\214\202") ;;
  Linux)
    if [ -r /etc/os-release ] && grep -qi "^id=ubuntu" /etc/os-release; then
      ICON=$(printf "\357\214\233")
    else
      ICON=$(printf "\357\205\274")
    fi ;;
esac
printf "%s" "$ICON"
'''
format = "[ $output ](bg:magenta fg:bg)[оӮ°](fg:magenta bg:blue0)"

[custom.os_err]
when = '[ "${STARSHIP_CMD_STATUS:-0}" != "0" ]'
shell = ["sh"]
command = '''
case "$(uname -s)" in
  Darwin) ICON=$(printf "\357\214\202") ;;
  Linux)
    if [ -r /etc/os-release ] && grep -qi "^id=ubuntu" /etc/os-release; then
      ICON=$(printf "\357\214\233")
    else
      ICON=$(printf "\357\205\274")
    fi ;;
esac
printf "%s" "$ICON"
'''
format = "[ $output ](bg:red fg:bg)[оӮ°](fg:red bg:blue0)"

# в”Җв”Җв”Җ Current directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
format = "[ $path ](bg:blue0 fg:fg)"
truncation_length = 0
truncate_to_repo = false
truncation_symbol = ""
home_symbol = "~"
read_only = " пҖЈ "

# в”Җв”Җв”Җ Directory close (only when not in a git repo) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Inside a repo the blue0вҶ’cyan opener of [git_branch] closes the
# directory segment. Outside a repo there's no next segment, so emit
# the powerline terminator explicitly. Octal escapes encode U+E0B0
# () because starship's custom module requires a non-empty command
# stdout to render, and dash's printf doesn't understand \uXXXX.
[custom.dir_close]
shell = ["sh"]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = 'printf "\356\202\260"'
format = "[$output](fg:blue0)"

# в”Җв”Җв”Җ Git branch + status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "пҗҳ"
format = "[оӮ°](fg:blue0 bg:cyan)[ $symbol $branch ](bg:cyan fg:bg)"

[git_status]
format = "[$all_status$ahead_behind](bg:cyan fg:bg)[оӮ°](fg:cyan)"
modified   = "${count}в—Ҹ "
staged     = "${count}+ "
untracked  = "${count}? "
ahead      = "вҮЎ${count} "
behind     = "вҮЈ${count} "
diverged   = "вҮ•${count} "
conflicted = "!${count} "
deleted    = "${count}вң– "
renamed    = "${count}В» "
stashed    = "${count}* "

# в”Җв”Җв”Җ Runtime versions (only when project files present) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
format = "[  $symbol $version ](fg:green)"
symbol = "оңҳ"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
format = "[  $symbol $version ](fg:yellow)"
symbol = "оңј"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile"]

[golang]
format = "[  $symbol $version ](fg:cyan)"
symbol = "оҳҰ"
detect_files = ["go.mod", "go.sum"]

[rust]
format = "[  $symbol $version ](fg:red)"
symbol = "оһЁ"
detect_files = ["Cargo.toml"]

[java]
format = "[  $symbol $version ](fg:orange)"
symbol = "оңё"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "deps.edn"]

# в”Җв”Җв”Җ Command duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
format = "[ took $duration ](fg:orange)"
min_time = 2000

# в”Җв”Җв”Җ Prompt character (vi-mode aware) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = ""
error_symbol   = ""
vimcmd_symbol  = "[вқ®](bold blue0)"
