# Kyle's tmux config — Tokyo Night via tmux-nova, plugins via tpm.

# ─── Terminal & display ────────────────────────────────────────────────
set  -g  default-terminal "tmux-256color"
set  -sa terminal-features ',alacritty:RGB'
set  -sa terminal-features ',xterm-256color:RGB'
set  -sa terminal-features ',tmux-256color:RGB'
set  -sa terminal-features ',*:usstyle'
setw -g  xterm-keys on
set  -s  escape-time 0
set  -sg repeat-time 600
set  -s  focus-events on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g set-titles on

set -g status-interval 10
set -g display-panes-time 800
set -g display-time 1000
set -g history-limit 10000

# Activity monitoring fires constantly under nvim / Claude Code, and
# tmux-nova's activity branch swaps out the powerline glyph. Quiet both.
set -g monitor-activity off
set-option -g bell-action none

set -g mouse on

# ─── Prefix ────────────────────────────────────────────────────────────
unbind C-a
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# ─── Copy mode (vi) ────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H      send-keys -X start-of-line
bind -T copy-mode-vi L      send-keys -X end-of-line

if -b 'command -v pbcopy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy'
if -b '! command -v pbcopy >/dev/null 2>&1 && command -v wl-copy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy'
if -b '! command -v pbcopy >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"'

# ─── Sessions ──────────────────────────────────────────────────────────
bind C-c new-session
bind C-f command-prompt -p "find-session:" "switch-client -t %%"
bind BTab switch-client -l

# ─── Windows ───────────────────────────────────────────────────────────
unbind n
unbind p
bind c  new-window  -c "#{pane_current_path}"
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# ─── Panes ─────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind >   swap-pane   -D
bind <   swap-pane   -U
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# ─── Buffers ───────────────────────────────────────────────────────────
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# ─── Misc ──────────────────────────────────────────────────────────────
bind e new-window -n edit-config "\$EDITOR $HOME/.config/tmux/tmux.conf"
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "reloaded"
bind M set -g mouse \; display "mouse: #{?mouse,on,off}"
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# ─── Palette (sourced for tmux-nova colour refs below) ─────────────────
source-file "$HOME/dotfiles/theme/palette.sh"

# ─── Plugins (tpm) ─────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim         'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '5'
set -g @continuum-restore       'on'
set -g @continuum-boot          'on'

# Interaction
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'b0o/tmux-autoreload'

# Session / floating panel / URL pickers
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind          'o'
set -g @sessionx-window-height '80%'
set -g @sessionx-window-width  '75%'
set -g @sessionx-zoxide-mode   'on'

set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind         'p'
set -g @floax-width        '80%'
set -g @floax-height       '80%'
set -g @floax-border-color 'blue'
set -g @floax-text-color   'white'

set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key            Space
set -g @thumbs-command        'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && tmux display "copied: {}"'

# Status bar
set -g @plugin 'o0th/tmux-nova'
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left  "\uE0B0"
set -g @nova-nerdfonts-right "\uE0B2"
set -g @nova-pane "#I #W"
set -g @nova-rows 0

set -g @nova-status-style-bg        "$bg"
set -g @nova-status-style-fg        "$fg"
set -g @nova-status-style-active-bg "$cyan"
set -g @nova-status-style-active-fg "$bg"
set -g @nova-status-activity-fg     "$red"
set -g @nova-pane-border-style        "$orange"
set -g @nova-pane-active-border-style "$cyan"

set -g @nova-segment-session        "#{session_name}"
set -g @nova-segment-session-colors "$magenta $bg"
set -g @nova-segment-prefix         "#{?client_prefix,PREFIX,}"
set -g @nova-segment-prefix-colors  "$fg $bg"
set -g @nova-segment-git            "#(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}')"
set -g @nova-segment-git-colors     "$blue0 $fg"
set -g @nova-segment-host           "#(~/.config/tmux/scripts/ssh-host.sh)"
set -g @nova-segment-host-colors    "$blue0 $fg"
set -g @nova-segments-0-left  "session"
set -g @nova-segments-0-right "prefix git host"

# Keep tpm state under XDG ($HOME/.config/tmux/plugins) not ~/.tmux/plugins.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

# Bootstrap tpm on first run, then load plugins (must be last).
if "test ! -d $HOME/.config/tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm \
         && $HOME/.config/tmux/plugins/tpm/bin/install_plugins'"
run '$HOME/.config/tmux/plugins/tpm/tpm'
